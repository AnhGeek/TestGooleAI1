name: Build and Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Environment and Create debug.keystore
        run: |
          # Copy .env.example to .env to satisfy the secrets gradle plugin if needed
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          
          # Generate a debug.keystore if it is missing (as it is not committed to the repository)
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build APKs
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug assembleRelease --stacktrace
          else
            gradle assembleDebug assembleRelease --stacktrace
          fi

      - name: Find and Rename APKs
        run: |
          mkdir -p build-artifacts
          # Locate debug APK and copy
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -n "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" build-artifacts/habit-tracker-debug.apk
            echo "Found debug APK: $DEBUG_APK"
          else
            echo "Debug APK not found"
          fi
          # Locate release APK and copy
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" build-artifacts/habit-tracker-release-unsigned.apk
            echo "Found release APK: $RELEASE_APK"
          else
            echo "Release APK not found"
          fi

      - name: Upload APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: habit-tracker-apks
          path: build-artifacts/
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/habit-tracker-debug.apk
            build-artifacts/habit-tracker-release-unsigned.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
